shared-version = true
pre-release-commit-message = "release v{{version}}"
tag-name = "v{{version}}"
tag-message = "v{{version}}"

# Keep pyproject.toml version in sync with Cargo.toml
[[pre-release-replacements]]
file = "pyproject.toml"
search = '^version = "[^"]*"'
replace = 'version = "{{version}}"'
min = 1
